# ============================================================
# RCA Case Schema v2 (DRAFT) — rca_kg/schema/rca_case.schema.yaml
# 역할: cases/*.yaml 의 필드 정의 및 허용 값 규칙
#
# v1 → v2 변경 요약 (2026-06-22 세션 결정 반영, 승인 전 초안):
#   1. status: unresolved 추가 (담당영역 밖 → 타 담당자 이관, confidence:low와 별개 축)
#   2. log_patterns[].line_range → cptime_range (cptime 기준, 단말 wall-clock 비교 불가)
#   3. raw_examples 제거 (로그 원문 인라인 금지 → signal_file+cptime_range 참조로 대체)
#   4. fingerprint 블록 신설 (signature_set+sequence, 시간 불변 동일원인 판정키)
#   5. occurrence_count + recent_occurrences(최근 5건) 신설 (재발 시 case 본체 미증식)
#   6. issue_type 에서 crash 제거 (deprecated, L1SW 전담)
#      v2-A: crash 전용 root_cause category(null_pointer_crash/assertion_failure)도 active enum 에서 제거
#   7. fix 블록에 confirmed_at/confirmed_by 추가 (별도 resolution 블록 신설 안 함 — SSOT)
#   8. related.jira 제거, recent_occurrences[].jira 로 단일화 (최근 5건만 추적, 전체이력 아님)
#   9. unresolved case는 cases/unresolved/ 폴더에 별도 보관, root_cause/fix/review를
#      명시적 null로 두어 "분석자 미입력"을 구분. 분석자 입력 완료 시 cases/로 통합(merge)
#      — 통합 절차는 본 파일 하단 note 참조
# ============================================================

case_id:
  type: string
  format: "<fingerprint-slug>_<issue_type>_<3-digit-seq>"
  example: "rach_msg3timeout_rach_failure_001"
  note: |
    더 이상 날짜 기반 ID 아님 — 한 case가 여러 날짜에 걸쳐 재발하므로 날짜 제외.
    unresolved 단계의 임시 파일은 case_id를 부여하지 않음 (파일명만으로 식별, 아래 참조).
    cases/로 통합(승격) 시점에 fingerprint 기준으로 정식 case_id를 부여.
  required: true

issue_type:
  type: enum
  values:
    - rach_failure
    - scg_failure
    - tx_abnormal
    - l2_max_retransmission
  required: true
  note: "crash 제거됨 (deprecated, L1SW 전담으로 확정)"

status:
  type: enum
  values:
    - analyzed     # 1차 분석 완료, 검토 전 (담당 영역 내, root_cause.confidence로 확실성 표현)
    - unresolved    # 담당 영역 밖 문제로 판단 → 타 담당자 이관 필요 (handoff 블록 필수)
    - reviewed      # 담당자 검토 완료
    - confirmed     # Root Cause 확정
    - rejected      # 분석 오류 또는 중복
  required: true
  default: analyzed
  note: |
    unresolved ≠ "원인 모름". 원인 불확실은 status:analyzed + root_cause.confidence:low 로 표현.
    unresolved 는 "이건 내 담당 모듈/도메인 문제가 아니다"라는 판단 결과.

# ─────────────────────────────────────
# handoff (status: unresolved 일 때만 사용)
# ─────────────────────────────────────
# 파일 위치: rca_kg/cases/unresolved/<date>_<issue_type>_<seq>_PENDING.yaml
#           (확정 case와 다른 폴더 — 분석자가 한눈에 "처리 대기"를 구분)
# 이 상태의 case는 root_cause / fix / review 가 명시적 null 이어야 함
#           → null 자체가 "분석자 미입력" 신호
handoff:
  reason:           { type: string, note: "담당영역 밖으로 판단한 근거" }
  suspected_domain: { type: string, optional: true, note: "추정 담당 도메인/모듈" }
  suspected_owner:  { type: string, optional: true, note: "이관 대상 담당자/팀" }
  handed_off_at:    { type: string, format: "YYYY-MM-DD", optional: true }

# ─────────────────────────────────────
# fingerprint — 동일 원인 case 판정 키 (시간 불변)
# ─────────────────────────────────────
fingerprint:
  signature_set:
    type: "list[string]"
    note: "등장한 시그니처 집합 (keywords.yaml 의 signature ID 참조, 순서 무관). alias(Msg1 등) 아닌 ID(RACH_MSG1 등) 표기"
    example: ["RACH_MSG1", "RACH_MSG2", "RACH_MSG3", "RACH_PHY_TIMER_EXPIRY"]
  sequence:
    type: string
    note: "cptime 기준 정렬한 시그니처 상대 순서. 절대시각 미포함 → 시험간 비교 가능. signature_set 과 동일하게 keywords.yaml ID 표기"
    example: "RACH_MSG1→RACH_MSG2→RACH_MSG3→(RACH_PHY_TIMER_EXPIRY)"
  sequence_status:
    type: enum
    values:
      - draft       # LLM이 cptime 정렬로 자동 추출한 초안
      - confirmed    # 분석자가 노이즈 제거·정규형 확정
    default: draft
  note: |
    매칭 키 = signature_set + sequence (module_set은 미포함 — 2026-06-22 결정).
    신규 case 생성 전 기존 case들과 이 키로 먼저 매칭 → 일치 시 occurrence_count++ 만 수행.

occurrence_count:
  type: integer
  default: 1
  note: "동일 fingerprint 재발 횟수. 매 재발마다 신규 case 미생성, 카운트만 증가"

recent_occurrences:
  type: list
  max_items: 5
  note: "최근 5건만 유지 (추적성 확보 + 용량 통제). 초과분은 순환 폐기"
  items:
    date:          { type: string, format: "YYYY-MM-DD", note: "wall-clock 기준 (인간 기록용)" }
    signal_file:   { type: string, note: "해당 발생의 _l1sw.txt 경로" }
    cptime_range:  { type: string, format: "<start_cptime>-<end_cptime>" }
    jira:          { type: string, optional: true }

first_seen: { type: string, format: "YYYY-MM-DD" }
last_seen:  { type: string, format: "YYYY-MM-DD" }

# ─────────────────────────────────────
# source — 최초(대표) 발생 기준 상세 정보
# ─────────────────────────────────────
source:
  original_log:
    path:       { type: string, note: "최초 발생 원본 .sdm 경로" }
    size_bytes: { type: integer }
    checksum:   { type: string, format: "sha256:<hex>", optional: true }
  signal_file: { type: string, note: "최초 발생의 _l1sw.txt 경로 (recent_occurrences[0]과 동일 가능)" }

# ─────────────────────────────────────
# symptom — 최초(대표) 발생 기준
# ─────────────────────────────────────
symptom:
  module:         { type: "list[string]", example: ["L1", "RRC"], note: "참고용 — fingerprint 매칭 키 아님" }
  severity:       { type: enum, values: [DEBUG, INFO, WARNING, ERROR, FATAL] }
  ue_id:          { type: string, optional: true, note: "마스킹 처리 권장" }
  description:    { type: string, note: "한 줄 증상 요약" }

# ─────────────────────────────────────
# log_patterns — 최초(대표) 발생의 증거 (재발 건은 recent_occurrences로 경량 기록)
# ─────────────────────────────────────
log_patterns:
  type: list
  items:
    pattern_id:    { type: string, format: "lp_<slug>" }
    signature:     { type: string, note: "keywords.yaml signature ID 참조 (본문 텍스트 미저장)" }
    cptime_range:  { type: string, format: "<start_cptime>-<end_cptime>", note: "signal_file 내 위치. 라인번호/wall-clock 아님" }
    frequency:     { type: integer, note: "해당 패턴 발생 횟수" }
  note: "raw_examples(로그 원문 인라인) 제거됨 — 필요 시 signal_file+cptime_range로 재추출"

# ─────────────────────────────────────
# root_cause
# ─────────────────────────────────────
root_cause:
  category:
    type: enum
    values:       # taxonomy.yaml 의 root_cause_categories 와 동기화
      - radio_access_timeout
      - nr_reconfig_timeout
      - scheduler_grant_missing
      - rlc_max_retransmission
      - harq_retx_exceeded
      - api_contract_mismatch
      - config_parameter_mismatch
      - unknown
  summary:    { type: string, note: "Root Cause 한 줄 요약" }
  confidence:
    type: enum
    values:
      - low        # 단서만 있음, 재현 미확인 (status:analyzed 와 조합되는 일반 케이스)
      - medium     # log 근거 있음, 수정 미적용
      - high       # 수정 후 증상 소멸 확인
      - confirmed  # TC 추가 또는 동료 리뷰 완료
  evidence:   { type: "list[string]", note: "log_patterns 의 pattern_id 참조" }
  code_ref:   { type: string, optional: true, note: "TODO: 5.2 Code Analyzer 산출물 구조 확인 후 연결 — 현재는 자유 텍스트 메모만" }

# ─────────────────────────────────────
# related
# ─────────────────────────────────────
related:
  hld:   { type: "list[string]", note: "HLD 문서 참조" }
  tc:    { type: "list[string]", note: "관련 Test Case ID" }
  api:   { type: "list[string]", note: "관련 API/IPC 이름" }
  note: |
    jira 필드 없음 — recent_occurrences[].jira로 통일 (2026-06-22 결정).
    occurrence_count > 5 인 경우 5건 이전의 jira 참조는 자연 소실됨 (용량 통제 트레이드오프).

# ─────────────────────────────────────
# fix
# ─────────────────────────────────────
fix:
  summary:       { type: string }
  commit:        { type: string, optional: true, note: "git commit hash 또는 null" }
  confirmed_at:  { type: string, format: "YYYY-MM-DD", optional: true }
  confirmed_by:  { type: string, optional: true, note: "확정한 분석자/담당자" }

# ─────────────────────────────────────
# prevent_rule
# ─────────────────────────────────────
prevent_rule:
  type: list
  items:
    rule:         { type: string }
    tc_candidate: { type: string, optional: true }

# ─────────────────────────────────────
# skill_seed
# ─────────────────────────────────────
skill_seed:
  update_target:       { type: string, note: "skills_seed/<file>.md" }
  checklist_candidate: { type: "list[string]" }

# ─────────────────────────────────────
# review
# ─────────────────────────────────────
review:
  status:      { type: enum, values: [draft, reviewed, confirmed, rejected] }
  reviewer:    { type: string }
  reviewed_at: { type: string, format: "YYYY-MM-DD", optional: true }
  comment:     { type: string, optional: true }

# ─────────────────────────────────────
# links
# ─────────────────────────────────────
links:
  similar_cases: { type: "list[string]", note: "유사 case_id 목록 (fingerprint 불일치하지만 연관된 경우)" }
  supersedes:    { type: "list[string]", note: "이 분석이 대체하는 이전 case_id" }
  duplicates:    { type: "list[string]", note: "중복 case_id (fingerprint 일치 시 자동 처리되므로 예외적 수동 표기용)" }

# ============================================================
# unresolved → confirmed 통합(merge) 절차
# ============================================================
# 1. 이관 시점: rca_kg/cases/unresolved/<date>_<issue_type>_<seq>_PENDING.yaml 생성
#    - status: unresolved, handoff 블록 작성
#    - root_cause / fix / review: 명시적 null (분석자 미입력 신호)
#    - fingerprint는 가능한 범위까지만 기록 (sequence_status: draft 가능, 미확정도 허용)
#
# 2. 분석자 입력: 같은 파일을 열어 root_cause / fix / review 직접 채움
#    - status를 confirmed (또는 rejected) 로 변경
#    - fingerprint.sequence_status를 confirmed로 정규화
#
# 3. 통합: fingerprint(signature_set+sequence) 기준으로 cases/ 내 기존 case와 매칭
#    - 일치하는 case 있음 → 기존 case의 occurrence_count++, recent_occurrences에 추가
#                          (5건 초과 시 가장 오래된 항목 폐기). PENDING 파일은 폐기.
#    - 일치하는 case 없음 → 정식 case_id 부여, 파일을 cases/ 로 이동(승격).
#                          PENDING 파일명은 사라지고 case_id 기준 파일명으로 교체.
#
# 4. index.md 갱신 (양쪽 케이스 모두 검색 가능하도록 갱신)
# ============================================================
