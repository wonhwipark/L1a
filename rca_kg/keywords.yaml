        use_for:
          fingerprint: true
          log_pattern: true
          prefilter: true
          l1sw_manifest_fragment: true
        noise_risk: low
        source_files:
          - scripts/rach_failure_prefilter.ps1
          - rca_kg/skills_seed/rach_failure_analyzer.md
        note: "현재 패키지에서 확인됨으로 표시된 유일한 RACH 핵심 signature."

