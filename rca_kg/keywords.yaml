# ============================================================
# RCA Keywords / Signature Registry v0.1
# 파일: rca_kg/keywords.yaml
#
# Concept:
#   이 파일은 단순 keyword list가 아니라 RCA Signature Registry 이다.
#
#   - keyword:
#       로그에 실제로 찍히는 문자열 또는 regex 후보.
#       예: "PHY_TIMER_EXPIRY", "RAR", "Msg3", "SCG-Config"
#
#   - signature:
#       RCA 분석에서 쓰는 표준화된 의미 ID.
#       fingerprint.signature_set 과 log_patterns[].signature 는 반드시 이 ID를 참조한다.
#       예: RACH_PHY_TIMER_EXPIRY, RACH_MSG3, SCG_BEAM_FAIL
#
#   - alias:
#       하나의 signature로 정규화할 수 있는 원문 표현 목록.
#       예: RACH_RAR_TIMEOUT 의 alias 로 "RAR timeout", "msg2 timeout" 등을 둘 수 있다.
#
#   - fingerprint policy:
#       너무 넓은 단어(RACH, SCG, RLC, HARQ)는 signal 추출에는 유용하지만
#       동일 원인 판정 fingerprint에는 부적합하다.
#       그래서 use_for.fingerprint=false 로 둔다.
#
#   - status policy:
#       confirmed: 실제 로그 또는 현장 확인으로 검증된 signature
#       candidate: 후보. 실 로그 검증 전이거나 노이즈 위험이 남아 있음
#       rejected: 사용해봤으나 노이즈가 커서 제외
#       deprecated: 과거에는 사용했으나 현재 설계에서 제외
#
#   - R3 범위:
#       keywords.yaml SSOT를 만드는 단계다.
#       scripts/*.ps1 자동 생성, L1SW manifest fragment 생성, 실 로그 E2E 검증은 R4/R5에서 진행한다.
# ============================================================

version: 0.1

metadata:
  created_at: 2026-06-22
  created_by: GPT
  source_package: RCA_standalone
  schema_ref: rca_kg/schema/keywords.schema.yaml
  related_case_schema: rca_kg/schema/rca_case.schema.yaml
  note: "R3 keywords.yaml SSOT initial draft. 실 로그 검증 전 후보가 다수 포함되어 있다."

policy:
  active_issue_types:
    - rach_failure
    - scg_failure
    - tx_abnormal
    - l2_max_retransmission
  excluded_issue_types:
    crash:
      owner: L1SW Log Analyzer
      policy: "5.5 RCA KG에서는 신규 crash case를 생성하지 않는다. 필요한 경우 L1SW 산출물 경로만 참조한다."
  matching_key:
    case_recurrence: "fingerprint.signature_set + fingerprint.sequence"
    module_set: "매칭 키에서 제외. symptom.module은 참고 정보로만 사용한다."
  sequence_time_base: cptime
  generic_keyword_policy: "RACH/SCG/RLC/HARQ 같은 넓은 키워드는 context 또는 prefilter 용도로만 사용하고 fingerprint 기본 후보에서는 제외한다."

status_definitions:
  confirmed: "실제 로그 또는 현장 확인으로 검증된 signature. fingerprint 기본 후보가 될 수 있다."
  candidate: "후보 signature. log_patterns에는 기록 가능하나 fingerprint 포함 시 sequence_status=draft 유지 권장."
  rejected: "노이즈가 커서 현재 사용하지 않는 signature. 기록 보존용."
  deprecated: "과거 사용했으나 현재 설계에서 제외된 signature."

role_definitions:
  start_event: "절차 시작을 나타내는 signature"
  progress_event: "절차 진행 단계를 나타내는 signature"
  failure_event: "실패 또는 timeout 등 장애 핵심 이벤트"
  timer_event: "타이머 시작/만료/복구 관련 이벤트"
  context: "문맥 필터링에는 유용하지만 원인 fingerprint로는 넓은 signature"
  recovery_event: "fallback, release, retry 등 복구 또는 후속 절차"

noise_risk_definitions:
  low: "오탐 가능성이 낮음"
  medium: "상황에 따라 오탐 가능성이 있음"
  high: "너무 넓거나 다른 이슈에도 자주 등장할 수 있음"

